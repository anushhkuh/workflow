name: job-alerts

on:
  schedule:
    - cron: "7,22,37,52 13-23 * * *"
    - cron: "7,37 0-12 * * *"
  workflow_dispatch: {}

concurrency:
  group: job-alerts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run poller
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python job_alerts.py
      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "update seen.json [skip ci]"
          git push
